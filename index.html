<h2>Calculate Your Zakat</h2>    


<form onsubmit="ZakatCalc(); return false;" id="re-set">

<br>
<input type="number" id="tw" name="tw" placeholder="Total Wealth"> <br>
<br>
<button type="submit">Result</button> <button type="reset" onclick="formRest()">Clear Form</button>
<br><br>
<input type="text" id="rslt" name="rslt" placeholder="Your Result"> <br>
</form>

<h2>Calculate Your BMI</h2> 
<form onsubmit="BMICalc(); return false;" id="re-set">

<br>

<br>

<br><br>
<input type="text" id="rslt2" name="rslt2" placeholder="Your Result"> <br>
</form>
